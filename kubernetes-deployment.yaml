apiVersion: v1
kind: Namespace
metadata:
  name: thermotwin-secure
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: thermotwin-secure
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-app
  namespace: thermotwin-secure
spec:
  podSelector:
    matchLabels:
      app: thermotwin-genesis
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    # Allow outgoing HTTPS to Google Firebase APIs
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: thermotwin-config
  namespace: thermotwin-secure
data:
  NODE_ENV: "production"
  PORT: "3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thermotwin-genesis-deployment
  namespace: thermotwin-secure
  labels:
    app: thermotwin-genesis
spec:
  replicas: 3
  selector:
    matchLabels:
      app: thermotwin-genesis
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: thermotwin-genesis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: web-app
        image: gcr.io/proven-woods-5fs6l/thermotwin-genesis:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: thermotwin-config
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: thermotwin-secrets
              key: gemini-api-key
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: tmp-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: thermotwin-service
  namespace: thermotwin-secure
spec:
  type: ClusterIP
  selector:
    app: thermotwin-genesis
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thermotwin-ingress
  namespace: thermotwin-secure
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - thermotwin.sovereign.vundla.io
    secretName: thermotwin-tls-cert
  rules:
  - host: thermotwin.sovereign.vundla.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: thermotwin-service
            port:
              number: 3000
